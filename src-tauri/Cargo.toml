[package]
name = "izumi"
version = "0.1.0"
description = "A Tauri App"
authors = ["you"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "izumi_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
libmpv2 = "6.0.0"
tauri-plugin-http = "2.5.9"
tokio = { version = "1", features = ["time"] }

# Raw Win32 for true borderless fullscreen + mpv-child input passthrough, and the
# WebView2 COM call to make the webview background transparent (Stremio's model:
# opaque window + transparent webview). windows 0.61 + webview2-com 0.38 match
# Tauri 2.11's own versions so the `with_webview` controller interface unifies.
[target.'cfg(windows)'.dependencies]
windows = { version = "0.61", features = [
  "Win32_Foundation",
  "Win32_Graphics_Gdi",
  "Win32_UI_WindowsAndMessaging",
] }
webview2-com = "0.38"

