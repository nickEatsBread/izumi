[package]
name = "izumi"
version = "0.1.0"
description = "A native desktop anime client"
authors = ["izumi contributors"]
edition = "2021"
license = "AGPL-3.0-or-later"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "izumi_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
libmpv2 = "6.0.0"
# Raw FFI for the software render API (headless scrub thumbnails) — the safe libmpv2
# RenderContext wrapper is OpenGL-only. Pinned to the version libmpv2 6.0.0 uses.
libmpv2-sys = "4.0.1"
tauri-plugin-http = "2.5.9"
tokio = { version = "1", features = ["time", "fs", "io-util", "net"] }
# Offline downloads: stream a resolved debrid URL to disk (pure reqwest GET — no
# webview http-scope, no plugin-fs). reqwest is already in the tree via plugin-http.
reqwest = { version = "0.12", features = ["stream"] }
futures-util = "0.3"
# Downscale headless-mpv screenshots (full-res PNG → small JPEG tile) for the warm
# scrub-thumbnail decoder. Minimal features: PNG decode + JPEG encode only.
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
# Native file dialog — pick the external-player executable.
tauri-plugin-dialog = "2"
# Signed auto-updater (GitHub Releases: stable = latest, beta = pre-release).
tauri-plugin-updater = "2"
url = "2"

# Raw Win32 for true borderless fullscreen + mpv-child input passthrough, and the
# WebView2 COM call to make the webview background transparent (Stremio's model:
# opaque window + transparent webview). windows 0.61 + webview2-com 0.38 match
# Tauri 2.11's own versions so the `with_webview` controller interface unifies.
[target.'cfg(windows)'.dependencies]
windows = { version = "0.61", features = [
  "Win32_Foundation",
  "Win32_Graphics_Gdi",
  "Win32_UI_WindowsAndMessaging",
] }
webview2-com = "0.38"

# Linux: embed mpv via its OpenGL render API into a GtkGLArea under the transparent
# webview (gamescope/Wayland-safe, unlike --wid). gtk3/gdk/glib match Tauri 2.11's
# webkitgtk stack; epoxy provides GL proc addresses (libmpv render get_proc_address);
# the `gl` crate is used only to read the GLArea's bound framebuffer id.
[target.'cfg(target_os = "linux")'.dependencies]
gtk = { version = "0.18", features = ["v3_24"] }
gdk = "0.18"
glib = "0.18"
epoxy = "0.1"
gl = "0.14"
webkit2gtk = { version = "2.0", features = ["v2_40"] }
# mpv render update-callback (render thread) -> main context redraw, via an async
# channel (glib's MainContext::channel is deprecated).
async-channel = "2"

