id: com.nicho.izumi
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22
command: izumi

# Why Flatpak (not AppImage) for the Steam Deck: the GNOME runtime provides webkit2gtk-4.1
# + gtk3 + mesa/EGL + pipewire as a version-matched set. We never bundle those host-coupled
# libs, so the two AppImage failures on SteamOS disappear by construction:
#   - bundled mesa/EGL vs the Deck's newer Mesa  → EGL_BAD_PARAMETER / white screen
#   - bundled libpipewire vs the Deck's libjack  → "undefined symbol: pw_log_topic_register"
# Full anime codecs (h264/h265/aac) come from the runtime's codecs-extra, not a bundled ffmpeg.
finish-args:
  - --share=network          # streaming, AniList/MAL, debrid
  - --share=ipc
  - --socket=wayland         # native Wayland: Desktop/KWin composites the video subsurface
                             # below the webview; Game mode (gamescope) composites the video
                             # LAYER-SHELL surface below the webview — both need Wayland.
  - --socket=fallback-x11    # X11-only sessions (and XWayland) still get a display
  - --filesystem=xdg-run/gamescope-0  # gamescope's own Wayland socket (Game mode), so the app
                             # can connect natively to it (WAYLAND_DISPLAY=gamescope-0) instead
                             # of falling to XWayland — required for the layer-shell overlay.
  - --socket=pulseaudio      # audio via the host PipeWire pulse socket (no bundled libpipewire)
  - --device=dri             # host GL/VAAPI — webkit compositing + the mpv render path
  - --device=all             # /dev/input — the webview Gamepad API reads the Deck controller
                             # (L2/R2 seek in Game mode); without it the sandbox hides all pads.
                             # (This flatpak version lacks the narrower --device=input.)
  - --filesystem=xdg-download # offline downloads
  # Steam Deck on-screen keyboard: reach the host Steam install to dlopen libsteam_api.so and talk
  # to the Steam client pipe (Steamworks ShowFloatingGamepadTextInput). ~/.steam is a symlink into
  # ~/.local/share/Steam; grant both so the pipe + the .so resolve. Falls back to the HTML keyboard
  # if Steam is unreachable.
  - --filesystem=~/.steam
  - --filesystem=~/.local/share/Steam:ro

# libmpv links ffmpeg internally; the runtime + codecs-extra (already on the Deck at branch
# 25.08-extra) provide the codecs, so we do NOT build or bundle ffmpeg.

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin
  # The freedesktop 25.08 SDK defaults meson's libdir to lib64, but flatpak's pkg-config
  # and linker only search /app/lib — so libplacebo/mpv would install their .pc + .so where
  # nothing finds them. Force every module to /app/lib.
  config-opts:
    - --libdir=lib

modules:
  # ----- the two mpv deps the GNOME runtime lacks -----
  - name: libass
    buildsystem: meson
    config-opts:
      - -Ddefault_library=shared
    sources:
      - type: git
        url: https://github.com/libass/libass.git
        tag: '0.17.5'

  - name: libplacebo
    buildsystem: meson
    config-opts:
      - -Dvulkan=disabled
      - -Dshaderc=disabled
      - -Ddemos=false
    sources:
      - type: git
        url: https://github.com/haasn/libplacebo.git
        tag: v7.360.1
        commit: cee9b076f2c63104ccfd497fa79c39a867293ec4

  # ----- libXpresent: the ONE X11 dev lib the GNOME 49 SDK lacks that mpv's `x11` output
  #       needs. Without it mpv's meson auto-disables ALL X11 support → mpv is Wayland-only →
  #       under gamescope (Game mode, XWayland X11) mpv can't create a GPU context and plays
  #       audio with NO video. Building it here (→ /app/lib) lets mpv build + link X11. -----
  - name: libXpresent
    buildsystem: autotools
    # The global `--libdir=lib` (for meson's lib64 default) is a RELATIVE path, which
    # autotools configure rejects ("expected an absolute directory name"). Override it to
    # the absolute /app/lib for this autotools module so it installs where mpv/ld look.
    build-options:
      config-opts:
        - --libdir=/app/lib
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/xorg/lib/libxpresent.git
        tag: libXpresent-1.0.1

  # ----- libmpv (no CLI player). pipewire DISABLED so mpv uses the pulse socket instead of
  #       preferring a pipewire AO — the canonical fix for the pw_log_topic_register class of
  #       crash (Stremio flathub PR#8, Jellyfin mpv-build). X11 ENABLED so mpv works under
  #       gamescope Game mode (XWayland) via `--wid` + gpu-context=x11egl — not just Wayland. -----
  - name: mpv
    buildsystem: meson
    config-opts:
      - -Dlibmpv=true       # the app still links libmpv (scrub-thumbnail core)
      - -Dcplayer=true      # AND the mpv binary (/app/bin/mpv)
      - -Dx11=enabled       # X11 video output/context — REQUIRED for Game mode (gamescope/XWayland)
      - -Dpipewire=disabled
      - -Dlua=disabled
      - -Djavascript=disabled
    sources:
      - type: git
        url: https://github.com/mpv-player/mpv.git
        tag: v0.40.0

  # ----- izumi (Tauri app). Network build (self-hosted bundle, not Flathub → no vendoring).
  #       Builds the local checkout, so on the Deck: clone, cd flatpak, flatpak-builder. -----
  - name: izumi
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
      env:
        CARGO_HOME: /run/build/izumi/cargo
        # libmpv2-sys emits `-lmpv` but not a search path; our mpv module installed
        # libmpv.so.2 to /app/lib, which isn't on cc's default link path. (Runtime is
        # fine — flatpak has /app/lib on its ld path.)
        LIBRARY_PATH: /app/lib
        # Belt-and-suspenders: LIBRARY_PATH was intermittently NOT propagated to the final
        # rust-lld invocation (→ "unable to find library -lmpv"). Pass the search path through
        # RUSTFLAGS too so rustc always emits `-L /app/lib` to the linker, deterministically.
        RUSTFLAGS: -L/app/lib
    build-commands:
      - npm ci
      # Prod builds NEVER include the webview inspector. For a debug build with devtools,
      # use flatpak/dev-build.sh (it injects --features devtools) — do not add it here.
      - npm run tauri build -- --no-bundle
      - install -Dm755 src-tauri/target/release/izumi /app/bin/izumi
      - install -Dm644 flatpak/com.nicho.izumi.desktop /app/share/applications/com.nicho.izumi.desktop
      # Sync the metainfo <release> version to the app version at build time. The file's
      # static version drifts otherwise (it lagged at 0.1.0 while the app moved on), which
      # makes GNOME Software / Discover show + install the flatpak as the OLD version.
      - APPVER=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' src-tauri/tauri.conf.json | head -1); sed -i "s|<release[^>]*>|<release version=\"$APPVER\" date=\"$(date +%F)\"/>|" flatpak/com.nicho.izumi.metainfo.xml
      - install -Dm644 flatpak/com.nicho.izumi.metainfo.xml /app/share/metainfo/com.nicho.izumi.metainfo.xml
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.nicho.izumi.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.nicho.izumi.png
      - install -Dm644 src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/com.nicho.izumi.png
    sources:
      - type: dir
        path: ..
