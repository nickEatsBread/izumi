name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: libmpv + Tauri deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libmpv-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libepoxy-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS deps
        run: npm ci

      - name: svelte-check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: cargo check
        working-directory: src-tauri
        run: cargo check
