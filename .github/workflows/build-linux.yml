name: build-linux

# Manual: build a Linux AppImage as a downloadable artifact (no release, no signing) so
# the mpv-embed spike can be tested on the Steam Deck. Actions tab -> build-linux -> Run.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: libmpv + GTK + Tauri deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libmpv-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libepoxy-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS deps
        run: npm ci

      # RELEASE build (small binary → fast AppImage bundling; a --debug build is huge
      # and makes linuxdeploy crawl). devtools via the Cargo feature so the inspector
      # still works to invoke the spike. AppImage only, no updater signing.
      - name: Build AppImage (release + devtools, no updater signing)
        run: npm run tauri build -- --features devtools --bundles appimage --config '{"bundle":{"createUpdaterArtifacts":false}}'

      # linuxdeploy bundles host mesa/EGL/GBM/wayland helper libs that clash with the
      # Steam Deck's newer Mesa → EGL_BAD_PARAMETER / white screen. Strip them so the
      # app uses the Deck's own graphics stack, then repackage.
      - name: Strip bundled graphics libs + repackage
        run: |
          cd src-tauri/target/release/bundle/appimage
          APP=$(ls *.AppImage | head -1)
          echo "repackaging $APP"
          ./"$APP" --appimage-extract >/dev/null
          L=squashfs-root/usr/lib
          rm -f "$L"/libEGL* "$L"/libGL* "$L"/libGLX* "$L"/libOpenGL* "$L"/libGLdispatch* \
                "$L"/libgbm* "$L"/libglapi* "$L"/libdrm* "$L"/libwayland* 2>/dev/null || true
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 /tmp/appimagetool squashfs-root "$APP"
          rm -rf squashfs-root
          echo "done: $(ls -la "$APP")"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: izumi-linux-appimage
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
