name: version bump

# Manual trigger from the Actions tab. Pick a bump type; this updates the version in
# package.json, tauri.conf.json, Cargo.toml (+ Cargo.lock), commits, tags, and pushes.
# The pushed tag triggers `release.yml` — BUT only if pushed with a PAT (GitHub blocks
# GITHUB_TOKEN pushes from triggering other workflows). See RELEASING.md for the
# one-time RELEASE_PAT setup; without it the tag is still created, just re-run/trigger
# the release manually.
on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Bump type'
        required: true
        type: choice
        default: patch
        options:
          - patch      # x.y.Z
          - minor      # x.Y.0
          - major      # X.0.0
          - beta       # x.y.z-beta.N  (pre-release)

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute + apply new version
        id: v
        run: |
          set -e
          if [ "${{ inputs.type }}" = "beta" ]; then
            NEW=$(npm version prerelease --preid beta --no-git-tag-version)
          else
            NEW=$(npm version ${{ inputs.type }} --no-git-tag-version)
          fi
          NEW=${NEW#v}
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          # Sync the Rust + Tauri manifests to the same version.
          sed -i "s/^  \"version\": \".*\"/  \"version\": \"$NEW\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \".*\"/version = \"$NEW\"/" src-tauri/Cargo.toml
          sed -i '/^name = "izumi"$/{n;s/^version = ".*"/version = "'"$NEW"'"/}' src-tauri/Cargo.lock
          echo "### Bumped to \`v$NEW\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Commit, tag, push
        run: |
          NEW=${{ steps.v.outputs.version }}
          git config user.name "nickEatsBread"
          git config user.email "nickEatsBread@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git commit -m "chore: release v$NEW"
          git tag "v$NEW"
          git push origin HEAD:main
          git push origin "v$NEW"
