name: release

# Tag-driven releases, all hosted on GitHub Releases:
#   v1.2.3         -> stable release  (updater "stable" channel = releases/latest)
#   v1.2.3-beta.1  -> rolling "beta" pre-release (updater "beta" channel)
#
# Any tag containing "-" is a beta: it is published to a single, rolling `beta`
# pre-release (overwritten each time) so the updater's beta endpoint stays static at
# .../releases/download/beta/latest.json.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Resolve channel + target tag
        id: meta
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "tag=beta" >> "$GITHUB_OUTPUT"          # rolling beta tag
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete previous rolling beta release (beta only)
        if: steps.meta.outputs.prerelease == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete beta --repo "${{ github.repository }}" --yes --cleanup-tag || true

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.meta.outputs.tag }}';
            const pre = ${{ steps.meta.outputs.prerelease }};
            const pushed = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: pre ? `izumi beta (${pushed})` : `izumi ${tag}`,
              body: 'Download an installer for your platform below. The app auto-updates.',
              draft: true,
              prerelease: pre,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            args: ''
          - platform: windows-latest
            args: '--config {"bundle":{"resources":["libmpv-2.dll"]}}'
          - platform: macos-14        # Apple Silicon (arm64) — unsigned .dmg
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # libmpv2-sys links `-l mpv`, so libmpv must be on the linker path.
      - name: libmpv + Tauri deps (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libmpv-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libepoxy-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # Windows: libmpv2-sys links `-l mpv` (needs mpv.lib) and the app needs
      # libmpv-2.dll at runtime. Set up MSVC (lib.exe), fetch the latest libmpv dev
      # build from shinchiro, make mpv.lib from the def, put it on LIB, stage the DLL.
      - name: Setup MSVC (lib.exe)
        if: matrix.platform == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: libmpv (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dir = "$env:RUNNER_TEMP\libmpv"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $hdr = @{ 'User-Agent' = 'izumi-ci' }
          $rel = Invoke-RestMethod 'https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest' -Headers $hdr
          $asset = $rel.assets | Where-Object { $_.name -like 'mpv-dev-x86_64-2*' -and $_.name -notlike '*v3*' } | Select-Object -First 1
          if (-not $asset) { throw 'no mpv-dev-x86_64 asset in latest release' }
          Write-Host "libmpv dev build: $($asset.name)"
          Invoke-WebRequest $asset.browser_download_url -OutFile "$dir\libmpv.7z" -Headers $hdr
          7z x "$dir\libmpv.7z" -o"$dir" -y
          $dll = (Get-ChildItem -Path $dir -Recurse -Filter 'libmpv-2.dll' | Select-Object -First 1).FullName
          if (-not $dll) { throw 'libmpv-2.dll not found in archive' }
          $libdir = Split-Path $dll
          # Newer shinchiro dev archives no longer ship mpv.def (only libmpv.dll.a, a GNU import
          # lib MSVC's link can't consume). Use it if present; otherwise synthesize a .def from the
          # DLL's exports (via dumpbin) so lib.exe can produce the MSVC import lib mpv.lib.
          $def = (Get-ChildItem -Path $dir -Recurse -Filter 'mpv.def' | Select-Object -First 1).FullName
          if (-not $def) {
            $def = "$libdir\mpv.def"
            'EXPORTS' | Set-Content $def
            & dumpbin /nologo /exports "$dll" |
              Select-String '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\w+)\s*$' |
              ForEach-Object { $_.Matches[0].Groups[1].Value } |
              Add-Content $def
            $count = ((Get-Content $def).Count - 1)
            if ($count -lt 1) { throw "synthesized mpv.def has no exports" }
            Write-Host "synthesized mpv.def with $count exports"
          }
          lib /def:"$def" /name:libmpv-2.dll /out:"$libdir\mpv.lib" /machine:x64
          echo "LIB=$libdir;$env:LIB" >> $env:GITHUB_ENV
          Copy-Item "$dll" "$env:GITHUB_WORKSPACE\src-tauri\libmpv-2.dll" -Force

      # macOS: libmpv2-sys links `-l mpv`; Homebrew provides libmpv + headers. But a user's Mac has
      # no Homebrew, and brew's libmpv hardcodes /opt/homebrew load paths and pulls a large dep tree
      # (ffmpeg / libass / libplacebo). So: rewrite libmpv's install-name id to @rpath so the app
      # records a RELOCATABLE load path, then dylibbundler copies libmpv + ALL its non-system deps
      # into a Frameworks staging dir (each id rewritten to @rpath). Those get bundled into the .app
      # (frameworks list below) and resolved at runtime via an @executable_path/../Frameworks rpath.
      # Unsigned (no Apple Developer cert): the bundler ad-hoc signs; users right-click > Open once.
      - name: libmpv + dylib bundling (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          set -euo pipefail
          brew update
          brew install mpv dylibbundler
          BREW="$(brew --prefix)"
          echo "PKG_CONFIG_PATH=$BREW/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=$BREW/lib" >> "$GITHUB_ENV"
          # Runtime search path for the dylibs bundled under the app's Frameworks folder.
          echo "RUSTFLAGS=-C link-arg=-Wl,-rpath,@executable_path/../Frameworks" >> "$GITHUB_ENV"
          # Record a relocatable load path in the app instead of /opt/homebrew/...
          chmod +w "$BREW/lib/libmpv.2.dylib"
          install_name_tool -id @rpath/libmpv.2.dylib "$BREW/lib/libmpv.2.dylib"
          # Stage libmpv + its recursive non-system deps with @rpath ids for bundling.
          STAGE="$GITHUB_WORKSPACE/src-tauri/macos-frameworks"
          mkdir -p "$STAGE"
          cp "$BREW/lib/libmpv.2.dylib" "$STAGE/"
          chmod +w "$STAGE/libmpv.2.dylib"
          dylibbundler -of -b -x "$STAGE/libmpv.2.dylib" -d "$STAGE" -p "@rpath/"
          # Compact JSON (NO spaces — survives tauri-action splitting args on spaces) listing every
          # staged dylib for Tauri's macOS `frameworks` bundler. Consumed by the build step's args.
          FW="$(python3 -c "import glob,json;print(json.dumps(sorted(glob.glob('$STAGE/*.dylib')),separators=(',',':')))")"
          echo "MAC_ARGS=--config {\"bundle\":{\"macOS\":{\"frameworks\":$FW}}}" >> "$GITHUB_ENV"

      - name: Install JS deps
        run: npm ci

      - name: Build + upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # From `npm run tauri signer generate`; store as repo secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true
          # macOS injects the dynamically-built frameworks list (MAC_ARGS) from the bundling step.
          args: ${{ startsWith(matrix.platform, 'macos') && env.MAC_ARGS || matrix.args }}

      # Upload version-less COPIES beside Tauri's versioned artifacts, so the README can link
      # permanent /releases/latest/download/<name> URLs that never change — GitHub-native, no
      # third party, no README edits per release. The versioned files stay; these are extra copies.
      - name: Publish stable-named copies
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          tag="${{ github.ref_name }}"; [[ "$tag" == *-* ]] && tag=beta   # betas publish to the rolling `beta` release
          B=src-tauri/target/release/bundle
          # copy <glob> <stable-name>: nullglob means only THIS runner's platform bundles match.
          copy() { local m=($1); [ ${#m[@]} -gt 0 ] || return 0; cp "${m[0]}" "$2"; gh release upload "$tag" "$2" --repo "${{ github.repository }}" --clobber; }
          copy "$B/nsis/*-setup.exe"     izumi-x64-setup.exe
          copy "$B/msi/*.msi"           izumi-x64.msi
          copy "$B/dmg/*.dmg"           izumi-aarch64.dmg
          copy "$B/appimage/*.AppImage" izumi-x86_64.AppImage
          copy "$B/deb/*.deb"           izumi-amd64.deb
          copy "$B/rpm/*.rpm"           izumi-x86_64.rpm

  cleanup-release-signatures:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Remove standalone updater signature assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api --paginate \
            "/repos/${{ github.repository }}/releases/${{ needs.create-release.outputs.release_id }}/assets" \
            --jq '.[] | select(.name | endswith(".sig")) | [.id, .name] | @tsv' |
          while IFS=$'\t' read -r id name; do
            [ -n "$id" ] || continue
            echo "Deleting $name"
            gh api -X DELETE "/repos/${{ github.repository }}/releases/assets/$id"
          done

  # The Steam Deck build is a Flatpak (NOT the desktop-Linux deb/rpm/AppImage above): SteamOS is
  # immutable and its system libs clash with a bundled AppImage (white screen), so the Deck uses the
  # GNOME runtime's matched webkit/gtk/mesa/pipewire. Built here the same way as locally, attached to
  # the release as its own asset. Runs independently of `build`, so a hiccup here never blocks the
  # desktop release; it just uploads the Deck bundle when ready.
  flatpak:
    needs: create-release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak + flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      # Cache the built runtime/SDK downloads + the module build tree so reruns skip the ~15min
      # mpv/libplacebo/libass compile. Keyed on the manifest — a dep bump invalidates it.
      - name: Cache flatpak build
        uses: actions/cache@v4
        with:
          path: |
            flatpak/.flatpak-builder
            ~/.local/share/flatpak
          key: flatpak-${{ hashFiles('flatpak/com.nicho.izumi.yml') }}
          restore-keys: flatpak-

      # Stable tag `vX.Y.Z` -> that tag; any pre-release (`-`) -> the rolling `beta` release.
      - name: Resolve release tag
        id: meta
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build the Steam Deck Flatpak bundle
        run: |
          # dbus-run-session: flatpak's --user ops need a session bus (absent on bare runners).
          # --install-deps-from=flathub pulls the GNOME 49 runtime/SDK + rust/node SDK extensions the
          # manifest pins (no hardcoded branch here). --disable-rofiles-fuse avoids fuse-in-CI issues.
          # Import the signing key + export a BINARY public key FIRST, so build-bundle can bake an
          # update ORIGIN into the .flatpak itself (--repo-url) plus the key that verifies it
          # (--gpg-keys). That's what lets a DIRECT `.flatpak` install (not just the .flatpakref)
          # `flatpak update` from Pages afterwards — the bundle is no longer install-only.
          echo "${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}" | gpg --batch --import
          gpg --export ${{ secrets.FLATPAK_GPG_KEY_ID }} > flatpak/izumi-key.gpg
          dbus-run-session -- bash -euxo pipefail -c '
            flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
            cd flatpak
            flatpak-builder --user --install-deps-from=flathub --force-clean --disable-rofiles-fuse \
              --repo=_repo _build com.nicho.izumi.yml
            flatpak build-bundle _repo \
              "../izumi-${{ steps.meta.outputs.tag }}-steamdeck.flatpak" \
              com.nicho.izumi \
              --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo \
              --repo-url=https://flatpak.izumi.watch/ \
              --gpg-keys=izumi-key.gpg
          '

      # Turn ./flatpak/_repo into a real, GPG-verified update ORIGIN published on GitHub Pages, so
      # BOTH the `.flatpakref` install and the direct `.flatpak` bundle (which now bakes in this same
      # origin, above) can `flatpak update` from it. Signing/deltas run on the on-disk repo directly
      # (no session bus needed). The key is already imported in the build step above; the minisign
      # updater key is separate.
      - name: Sign the OSTree repo + generate static deltas
        run: |
          set -euxo pipefail
          flatpak build-sign flatpak/_repo \
            --gpg-sign=${{ secrets.FLATPAK_GPG_KEY_ID }} com.nicho.izumi
          flatpak build-update-repo flatpak/_repo \
            --generate-static-deltas --gpg-sign=${{ secrets.FLATPAK_GPG_KEY_ID }}
          gpg --export --armor ${{ secrets.FLATPAK_GPG_KEY_ID }} > flatpak/_repo/izumi.gpg

      # The one-file install descriptor users open on the Deck. Embeds the repo URL + the base64
      # GPG public key so `flatpak install <url>/com.nicho.izumi.flatpakref` trusts the origin.
      - name: Emit the .flatpakref
        run: |
          set -euxo pipefail
          cat > flatpak/_repo/com.nicho.izumi.flatpakref <<EOF
          [Flatpak Ref]
          Name=com.nicho.izumi
          Branch=master
          Url=https://flatpak.izumi.watch/
          GPGKey=$(base64 -w0 flatpak/_repo/izumi.gpg)
          IsRuntime=false
          RuntimeRepo=https://flathub.org/repo/flathub.flatpakrepo
          EOF

      # Publish to GitHub Pages, served at the custom domain flatpak.izumi.watch (the `cname` input
      # writes the CNAME file). The URL baked into the bundle + .flatpakref is that DOMAIN, not the
      # host — so Pages can be swapped for R2 / any static host later by re-pointing the domain, with
      # no client rebuild/re-release. keep_files: never delete older commits/deltas — clients on an
      # older build need the objects + deltas between their commit and HEAD to stay reachable.
      # (GitHub Pages allows up to 100 MB/file + 1 GB/site, which fits izumi's OSTree objects.)
      - name: Publish the OSTree repo to GitHub Pages (flatpak.izumi.watch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./flatpak/_repo
          keep_files: true
          cname: flatpak.izumi.watch

      - name: Attach the Flatpak to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.meta.outputs.tag }}" \
            izumi-*.flatpak --repo "${{ github.repository }}" --clobber

  # Android APK (arm64), signed with the release keystore so the in-app self-updater can
  # install it over a previous build. Runs independently of `build` (a hiccup here never
  # blocks the desktop release); attaches the signed APK to the same release. The Android
  # updater finds it via the GitHub Releases API (no updater signature / latest.json needed).
  android:
    needs: create-release
    runs-on: ubuntu-latest
    # Two flavors: `lite` (external player, ~12 MB) and `full` (embedded libmpv, ~36 MB). Both are
    # signed with the same release key so the in-app updater can install either over a prior build;
    # the updater picks the asset matching the running flavor (see src/lib/updater/android.ts).
    strategy:
      fail-fast: false
      matrix:
        flavor: [lite, full]
    env:
      NDK_VERSION: "27.0.12077973"
      BUILD_TOOLS: "35.0.0"
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: meta
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + platform + build-tools
        run: |
          sdkmanager --install "ndk;${NDK_VERSION}" "platforms;android-36" "build-tools;${BUILD_TOOLS}"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust + Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: android-${{ matrix.flavor }}

      - name: Install JS deps
        run: npm ci

      # `gen/android` is regenerated by `tauri android init`, so flavor-specific project tweaks are
      # applied here (they can't be committed). Lite has no mpv plugin, so it must not reference the
      # mpv capability; full needs Kotlin ≥2.2 to read the libmpv AAR's metadata + the PiP flag.
      - name: Configure flavor + scaffold Android project
        run: |
          set -euo pipefail
          if [ "${{ matrix.flavor }}" = "lite" ]; then
            rm -f src-tauri/capabilities/android-mpv.json
          fi
          npx tauri android init
          if [ "${{ matrix.flavor }}" = "full" ]; then
            sed -i -E 's/kotlin-gradle-plugin:[0-9.]+/kotlin-gradle-plugin:2.2.0/' src-tauri/gen/android/build.gradle.kts
            sed -i 's#android:name=".MainActivity"#android:name=".MainActivity"\n            android:supportsPictureInPicture="true"#' src-tauri/gen/android/app/src/main/AndroidManifest.xml
          fi

      - name: Build Android APK (arm64, ${{ matrix.flavor }})
        run: |
          if [ "${{ matrix.flavor }}" = "full" ]; then
            npx tauri android build --apk --target aarch64 --features android-mpv
          else
            npx tauri android build --apk --target aarch64
          fi

      - name: Sign the APK with the release keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/release.jks"
          BT="$ANDROID_SDK_ROOT/build-tools/${BUILD_TOOLS}"
          UNSIGNED="$(find src-tauri/gen/android -path '*release*' -name '*-unsigned.apk' | head -1)"
          if [ -z "$UNSIGNED" ]; then echo "no unsigned APK produced"; exit 1; fi
          OUT="izumi-${{ steps.meta.outputs.tag }}-android-arm64-${{ matrix.flavor }}.apk"
          "$BT/zipalign" -f -p 4 "$UNSIGNED" "$RUNNER_TEMP/aligned.apk"
          "$BT/apksigner" sign --ks "$RUNNER_TEMP/release.jks" --ks-pass "pass:$KS_PASS" \
            --ks-key-alias "$KEY_ALIAS" --key-pass "pass:$KEY_PASS" --out "$OUT" "$RUNNER_TEMP/aligned.apk"
          "$BT/apksigner" verify --verbose "$OUT"
          rm -f "$RUNNER_TEMP/release.jks" "$RUNNER_TEMP/aligned.apk"

      - name: Attach the APK to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          T="${{ steps.meta.outputs.tag }}"
          VER="izumi-$T-android-arm64-${{ matrix.flavor }}.apk"
          gh release upload "$T" "$VER" --repo "${{ github.repository }}" --clobber
          # Version-less copy for the README's permanent /latest/download link (versioned one stays).
          cp "$VER" "izumi-android-${{ matrix.flavor }}.apk"
          gh release upload "$T" "izumi-android-${{ matrix.flavor }}.apk" --repo "${{ github.repository }}" --clobber

  publish-release:
    needs: [create-release, build, cleanup-release-signatures]
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release (un-draft)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              prerelease: ${{ needs.create-release.outputs.prerelease }},
            });
