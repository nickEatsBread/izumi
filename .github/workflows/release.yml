name: release

# Tag-driven releases, all hosted on GitHub Releases:
#   v1.2.3         -> stable release  (updater "stable" channel = releases/latest)
#   v1.2.3-beta.1  -> rolling "beta" pre-release (updater "beta" channel)
#
# Any tag containing "-" is a beta: it is published to a single, rolling `beta`
# pre-release (overwritten each time) so the updater's beta endpoint stays static at
# .../releases/download/beta/latest.json.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Resolve channel + target tag
        id: meta
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "tag=beta" >> "$GITHUB_OUTPUT"          # rolling beta tag
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete previous rolling beta release (beta only)
        if: steps.meta.outputs.prerelease == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete beta --repo "${{ github.repository }}" --yes --cleanup-tag || true

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.meta.outputs.tag }}';
            const pre = ${{ steps.meta.outputs.prerelease }};
            const pushed = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: pre ? `izumi beta (${pushed})` : `izumi ${tag}`,
              body: 'Download an installer for your platform below. The app auto-updates.',
              draft: true,
              prerelease: pre,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            args: ''
          - platform: windows-latest
            args: '--config {"bundle":{"resources":["libmpv-2.dll"]}}'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # libmpv2-sys links `-l mpv`, so libmpv must be on the linker path.
      - name: libmpv + Tauri deps (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libmpv-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libepoxy-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # Windows: libmpv2-sys links `-l mpv` (needs mpv.lib) and the app needs
      # libmpv-2.dll at runtime. Set up MSVC (lib.exe), fetch the latest libmpv dev
      # build from shinchiro, make mpv.lib from the def, put it on LIB, stage the DLL.
      - name: Setup MSVC (lib.exe)
        if: matrix.platform == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: libmpv (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dir = "$env:RUNNER_TEMP\libmpv"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $hdr = @{ 'User-Agent' = 'izumi-ci' }
          $rel = Invoke-RestMethod 'https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest' -Headers $hdr
          $asset = $rel.assets | Where-Object { $_.name -like 'mpv-dev-x86_64-2*' -and $_.name -notlike '*v3*' } | Select-Object -First 1
          if (-not $asset) { throw 'no mpv-dev-x86_64 asset in latest release' }
          Write-Host "libmpv dev build: $($asset.name)"
          Invoke-WebRequest $asset.browser_download_url -OutFile "$dir\libmpv.7z" -Headers $hdr
          7z x "$dir\libmpv.7z" -o"$dir" -y
          $def = (Get-ChildItem -Path $dir -Recurse -Filter 'mpv.def'      | Select-Object -First 1).FullName
          $dll = (Get-ChildItem -Path $dir -Recurse -Filter 'libmpv-2.dll' | Select-Object -First 1).FullName
          if (-not $def) { throw 'mpv.def not found in archive' }
          if (-not $dll) { throw 'libmpv-2.dll not found in archive' }
          $libdir = Split-Path $def
          lib /def:"$def" /name:libmpv-2.dll /out:"$libdir\mpv.lib" /machine:x64
          echo "LIB=$libdir;$env:LIB" >> $env:GITHUB_ENV
          Copy-Item "$dll" "$env:GITHUB_WORKSPACE\src-tauri\libmpv-2.dll" -Force

      - name: Install JS deps
        run: npm ci

      - name: Build + upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # From `npm run tauri signer generate`; store as repo secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release (un-draft)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              prerelease: ${{ needs.create-release.outputs.prerelease }},
            });
