<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!--
    Same-origin Disqus embed host page, iframed by the in-player discussion panel.

    Why a real page (not the panel's srcdoc): Disqus' embed.js reads window.location and needs a real
    http(s) document + storage; a srcdoc frame is `about:srcdoc` and breaks it. Served from static/ so
    it loads at the app origin (localhost in dev, tauri.localhost in prod).

    Why no-referrer: izumi's origin isn't a Disqus "trusted domain" for the forum, so if embed.js sent
    our origin as the referrer, the trusted-domain check would refuse and the frame renders blank. The
    <meta referrer> + script.referrerPolicy suppress it so the embed loads read-only. Mirrors the
    reference extension's loader (script.referrerPolicy='no-referrer').

    Config comes from the query string the panel builds from the SDK's embedUrl:
      f=<forum shortname>  t_i=<identifier>  t_u=<canonical page url>  t_t=<title>
  -->
  <meta name="referrer" content="no-referrer" />
  <!-- Scripts in THIS page: only ours (inline) + embed.js itself. embed.js also injects its "lounge"
       helper (alfie, from disquscdn) into its HOST page, which runs a link-affiliation tracker
       (viglink) firing plain-http beacons — none of it is needed for the comments, which live in a
       cross-origin disqus.com iframe this policy can't touch. script-src drops alfie & friends;
       img-src https: kills any plain-http beacon from whatever still runs. Fetches (reaction counts
       to the forum host) stay unrestricted. -->
  <meta http-equiv="Content-Security-Policy"
        content="script-src 'unsafe-inline' https://disqus.com https://*.disqus.com; img-src https: data: blob:" />
  <!-- Warm the TLS handshakes the embed is guaranteed to need: the forum subdomain serves embed.js,
       disqus.com serves the inner comments iframe, disquscdn serves its app bundle. (Same connection
       pool as the inner iframe: pooling is partitioned by top-level site, which we share.) The forum
       subdomain is only known from the query string, so a tiny parser-blocking script injects it
       before anything else queues. -->
  <link rel="preconnect" href="https://disqus.com" />
  <link rel="preconnect" href="https://c.disquscdn.com" />
  <script>
    (function () {
      var f = (new URLSearchParams(location.search).get('f') || '').trim();
      if (!/^[a-zA-Z0-9-]+$/.test(f)) return;
      var l = document.createElement('link');
      l.rel = 'preconnect';
      l.href = 'https://' + f + '.disqus.com';
      document.head.appendChild(l);
    })();
  </script>
  <!-- Roboto for the embed's own chrome (reactions strip + wrapper). The Disqus comment text itself
       lives in a cross-origin disqus.com iframe we can't restyle (the reference extension forces
       Roboto there via a content-script injected INTO that iframe — only an extension can). Loaded
       async (preload→stylesheet swap): a plain stylesheet link would hold up the body-end inline
       script — parser-inserted scripts wait on pending sheets — putting a fonts.googleapis.com round
       trip in front of the embed.js request. Brief fallback-font flash on the strip is fine. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
        onload="this.onload=null;this.rel='stylesheet'" />
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a0b; color-scheme: dark; font-family: 'Roboto', sans-serif; }
    /* Thin, themed scrollbar (this page is a separate doc, so the app's global scrollbar hiding doesn't
       reach it). STANDARD properties only — ::-webkit-scrollbar custom-painted scrollbars need a
       main-thread thumb repaint on every scroll offset, and embed.js keeps that thread busy; the
       native thin scrollbar composites off-thread with the same translucent look. */
    html { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.16) transparent; }
    #disqus_thread { padding: 10px; }
    #err { padding: 16px; font: 13px system-ui, sans-serif; color: #9aa0a6; }
    /* Reactions strip — public per-thread counts from the forum host, shown above the comments (where
       the reference extension injects its own strip). Interactive: this page can't post (CORS blocks
       POST + no forum session here), so a click asks the parent app to post via the native ext_fetch
       command (which carries the da_session cookie); the parent posts the authoritative counts back. */
    #reactions { display: none; border-bottom: 1px solid rgba(255,255,255,0.08); padding: 10px 12px; }
    #reactions, #reactions * { box-sizing: border-box; } /* so tile width includes padding+border, like the reference */
    .rx-head { font-size: 12px; font-weight: 700; color: #cbd5e1; margin: 0 0 8px; }
    .rx-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .rx-chip { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.06);
               border: 0; border-radius: 999px; padding: 4px 10px; color: #e5e7eb;
               font-size: 13px; font-weight: 700; cursor: pointer; }
    .rx-chip:hover { background: rgba(255,255,255,0.12); }
    .rx-chip.sel { background: rgba(80,140,255,0.28); color: #cfe0ff; }
    .rx-chip[disabled] { opacity: 0.6; cursor: default; }
    .rx-chip img { width: 20px; height: 20px; object-fit: contain; display: block; }
    .rx-l { font-weight: 700; }
    .rx-n { font-variant-numeric: tabular-nums; color: #9aa4b2; }
    .rx-total { display: none; font-size: 14px; color: #9aa4b2; margin: 0 0 14px; }
    /* Expanded (enlarged) mode: big centered vertical tiles — icon on top, count, label — matching the
       reference reactions widget. The host app toggles #reactions.expanded via postMessage. */
    #reactions.expanded { text-align: center; padding: 16px 12px 20px; }
    #reactions.expanded .rx-head { font-size: 20px; color: #f5f6fa; margin-bottom: 4px; }
    #reactions.expanded .rx-total { display: block; }
    /* fit-content + auto margins keeps the tiles packed together and centered, whatever the panel width.
       gap:0 + fixed-width tiles = they sit right next to each other, like the reference widget. */
    #reactions.expanded .rx-row { justify-content: center; gap: 0; width: fit-content; max-width: 100%; margin: 0 auto; }
    #reactions.expanded .rx-chip { flex-direction: column; gap: 2px; width: 96px; min-width: 96px; padding: 8px 6px 7px;
                                   background: transparent; border: 1px solid transparent; border-radius: 20px; }
    #reactions.expanded .rx-chip .rx-l { white-space: nowrap; }
    #reactions.expanded .rx-chip:hover { background: rgba(255,255,255,0.08); }
    #reactions.expanded .rx-chip.sel { background: transparent; border-color: #2e9fff; border-radius: 8px; }
    #reactions.expanded .rx-chip img { width: 42px; height: 42px; }
    #reactions.expanded .rx-n { order: 1; font-size: 20px; font-weight: 700; color: #e6e8ee; }
    #reactions.expanded .rx-l { order: 2; font-size: 12px; font-weight: 400; color: #cbd5e1; }
    #reactions.expanded .rx-chip.sel .rx-n, #reactions.expanded .rx-chip.sel .rx-l { color: #2e9fff; }
    /* Ad-block backstop: Disqus injects its monetization + poll frames from *.services.disqus.com
       (tempest = ads, polls = surveys) into this host doc. Comments come from disqus.com /
       disquscdn.com — never services.disqus.com — so hiding that subdomain family is safe. The
       observer below also removes them outright (this only covers any that slip in pre-script). */
    iframe[src*="services.disqus.com"] { display: none !important; }
    /* Wheel-burst fast path: the comments live in a full-height CROSS-ORIGIN iframe that never
       scrolls itself, so a wheel over it is hit-tested to the Disqus renderer process first (its
       first event per sequence even cancelable → blocks on that busy main thread) before the
       scroll bubbles back to THIS document's scroller. During a wheel burst we drop the inner
       iframe's hit-testing so wheel targets this scroller directly; hover/clicks inside the
       comments only pause for the burst + 150ms (the embedded-map pattern). */
    html.wheeling #disqus_thread iframe { pointer-events: none; }
  </style>
</head>
<body>
  <div id="reactions"></div>
  <div id="disqus_thread"></div>
  <div id="err" hidden>Discussion unavailable.</div>
  <script>
    (function () {
      var q = new URLSearchParams(location.search);
      var forum = (q.get('f') || '').trim();
      var url = (q.get('t_u') || '').trim();
      var identifier = (q.get('t_i') || '').trim();
      var title = (q.get('t_t') || '').trim();

      // Validate the shortname (goes into a subdomain) — alnum + hyphen only.
      if (!/^[a-zA-Z0-9-]+$/.test(forum)) {
        document.getElementById('disqus_thread').hidden = true;
        document.getElementById('err').hidden = false;
        return;
      }

      window.disqus_config = function () {
        // Canonical (trusted-domain) URL so the right thread resolves despite the untrusted embed origin.
        this.page.url = url;
        this.page.identifier = identifier;
        this.page.title = title;
      };

      // Wheel-burst marker for the fast-path CSS above. Passive: it only toggles a class, never
      // consumes the event. (Chromium latches scroll targets per sequence, so the very first tick
      // of a fresh burst may still route through the Disqus frame — every subsequent sequence
      // while the class is held goes straight to this document.)
      var wheelT;
      window.addEventListener('wheel', function () {
        var el = document.documentElement;
        el.classList.add('wheeling');
        window.clearTimeout(wheelT);
        wheelT = window.setTimeout(function () { el.classList.remove('wheeling'); }, 150);
      }, { passive: true });

      var s = document.createElement('script');
      s.src = 'https://' + forum + '.disqus.com/embed.js';
      s.async = true;
      s.fetchPriority = 'high'; // everything on this page waits on it; no-op where unsupported
      s.referrerPolicy = 'no-referrer';
      s.setAttribute('data-timestamp', +new Date());
      (document.head || document.body).appendChild(s);

      // Ad-block: Disqus appends ad (tempest) + poll frames from *.services.disqus.com into this
      // host doc. Remove them on insertion (removing the node also aborts the in-flight request —
      // stronger than display:none). Mirrors the reference extension's DNR block of the same hosts.
      var AD_FRAME = /\.services\.disqus\.com\//i
      var killAds = function (n) {
        if (n.tagName === 'IFRAME') { if (n.src && AD_FRAME.test(n.src)) n.remove(); return }
        if (n.querySelectorAll) n.querySelectorAll('iframe').forEach(function (f) { if (f.src && AD_FRAME.test(f.src)) f.remove() })
      }
      new MutationObserver(function (muts) {
        muts.forEach(function (m) { m.addedNodes.forEach(killAds) })
      }).observe(document.documentElement, { childList: true, subtree: true });

      // Reactions strip: forum public counts (GET is CORS-open) rendered above the comments. A click
      // can't post from here (CORS blocks POST + no forum session in this frame), so it asks the parent
      // app to post via its native command (which carries the da_session cookie) and posts the
      // authoritative counts back. Parent messaging is same-origin only (this page is app-served).
      (function renderReactions() {
        if (!url || !identifier) return
        var apiBase; try { apiBase = new URL(url).origin } catch (_) { return }
        var host = document.getElementById('reactions')
        var KEYS = ['upvote', 'funny', 'love', 'surprised', 'angry', 'sad']
        var EMOJI = { upvote: '👍', funny: '😂', love: '❤️', surprised: '😮', angry: '😠', sad: '😢' }
        var LABELS = { upvote: 'Upvote', funny: 'Funny', love: 'Love', surprised: 'Surprised', angry: 'Angry', sad: 'Sad' }
        var chips = {}, nums = {}, selected = null, busy = false, totalEl = null

        function setCounts(c) {
          var sum = 0
          KEYS.forEach(function (k) { var v = (c && c[k]) || 0; sum += v; if (nums[k]) nums[k].textContent = String(v) })
          if (totalEl) totalEl.textContent = sum + (sum === 1 ? ' Response' : ' Responses')
        }
        function setSelected(key) { selected = key; KEYS.forEach(function (k) { if (chips[k]) chips[k].classList.toggle('sel', k === key) }) }
        function setBusy(b) { busy = b; KEYS.forEach(function (k) { if (chips[k]) { if (b) { chips[k].setAttribute('disabled', '') } else { chips[k].removeAttribute('disabled') } } }) }
        function onClick(k) {
          if (busy) return
          setBusy(true)
          var next = (selected === k) ? null : k // clicking the active reaction clears it
          try { window.parent.postMessage({ type: 'izumi-react', base: apiBase, identifier: identifier, key: next }, location.origin) }
          catch (_) { setBusy(false) }
        }
        window.addEventListener('message', function (e) {
          if (e.origin !== location.origin) return
          var m = e.data
          if (!m) return
          // Layout from the host app: side (compact chips) vs expanded (big Hayami-style tiles).
          if (m.type === 'izumi-mode') { host.classList.toggle('expanded', !!m.expanded); return }
          if (m.type === 'izumi-reaction-state-result') {
            if (m.counts) setCounts(m.counts)
            setSelected(m.reaction || null)
            return
          }
          if (m.type !== 'izumi-react-result') return
          setBusy(false)
          if (m.ok) { if (m.counts) setCounts(m.counts); setSelected(m.reaction || null) }
        })

        fetch(apiBase + '/api/threads/by-identifier/' + encodeURIComponent(identifier) + '/reaction', { referrerPolicy: 'no-referrer' })
          .then(function (r) { return r.ok ? r.json() : null })
          .then(function (d) {
            if (!d || !d.counts) return
            var head = document.createElement('div'); head.className = 'rx-head'; head.textContent = d.heading || 'What do you think?'
            totalEl = document.createElement('div'); totalEl.className = 'rx-total' // shown in expanded mode
            var row = document.createElement('div'); row.className = 'rx-row'
            KEYS.forEach(function (k) {
              var label = (d.labels && d.labels[k]) || LABELS[k] || k
              var b = document.createElement('div'); b.className = 'rx-chip'; b.title = label
              var sprite = d.sprites && d.sprites[k]
              if (sprite) { var img = document.createElement('img'); img.src = sprite; img.alt = k; b.appendChild(img) }
              else { var em = document.createElement('span'); em.textContent = EMOJI[k]; b.appendChild(em) }
              var l = document.createElement('span'); l.className = 'rx-l'; l.textContent = label; b.appendChild(l)
              var n = document.createElement('span'); n.className = 'rx-n'; n.textContent = String(d.counts[k] || 0); b.appendChild(n)
              b.addEventListener('click', (function (key) { return function () { onClick(key) } })(k))
              chips[k] = b; nums[k] = n
              row.appendChild(b)
            })
            host.appendChild(head); host.appendChild(totalEl); host.appendChild(row); host.style.display = 'block'
            setCounts(d.counts) // fills the total line
            if (d.selectedKey) setSelected(d.selectedKey)
            // The public browser GET cannot include the discussanime session cookie, so ask the app's
            // native bridge for the authenticated selectedKey after the controls exist.
            try { window.parent.postMessage({ type: 'izumi-reaction-state', base: apiBase, identifier: identifier }, location.origin) }
            catch (_) {}
          })
          .catch(function () {})
      })();
    })();
  </script>
</body>
</html>
